schema_version: 1
parameter_record_fields:
  - key
  - label
  - type
  - default
  - allowed_values
  - min
  - max
  - step
  - visibility_tier
  - automl_searchable
  - depends_on
  - backend_scope
  - description

example_records:
  - key: learning_rate
    label: Learning rate
    type: float
    default: 0.001
    min: 1.0e-06
    max: 1.0
    step: null
    visibility_tier: basic
    automl_searchable: true
    depends_on: []
    backend_scope: global
    description: Base optimizer learning rate.
  - key: graph_radius_cutoff
    label: Graph radius cutoff
    type: float
    default: 5.0
    min: 1.0
    max: 20.0
    step: 0.1
    visibility_tier: advanced
    automl_searchable: true
    depends_on:
      - model_family in [graph, geometric_graph]
    backend_scope: graph
    description: Radius threshold for spatial graph edge construction.
