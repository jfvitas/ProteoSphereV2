distributed:
  mode:
  - none
  - ddp
  - fsdp
  num_nodes:
    type: int
    default: 1
  gpus_per_node:
    type: int
    default: 1
precision:
- fp32
- fp16
- bf16
gradient:
  clipping:
    type: float
    default: 0.0
  accumulation_steps:
    type: int
    default: 1
checkpointing:
  save_interval:
    type: int
    default: 1
  save_best_only:
    type: bool
    default: true
