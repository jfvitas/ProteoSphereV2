name: CI

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest ruff scikit-learn
          python -m pip install torch --index-url https://download.pytorch.org/whl/cpu
      - name: Seed queue
        run: python scripts/seed_queue.py
      - name: Lint
        run: python -m ruff check .
      - name: Repo smoke tests
        run: python -m pytest tests/unit/test_ci_presence.py tests/unit/test_bootstrap_repo.py tests/unit/test_model_studio_task_catalog.py -q
      - name: Model Studio smoke tests
        shell: bash
        run: |
          set +e
          python -m pytest tests/unit/test_model_studio_public_ci.py -q > model_studio_smoke.log 2>&1
          status=$?
          cat model_studio_smoke.log
          if [ "$status" -ne 0 ]; then
            python - <<'PY'
from pathlib import Path

text = Path("model_studio_smoke.log").read_text(encoding="utf-8", errors="replace")
tail = "\n".join(text.strip().splitlines()[-20:])
escaped = tail.replace("%", "%25").replace("\r", "%0D").replace("\n", "%0A")
print(f"::error title=Model Studio smoke failure::{escaped}")
PY
            exit "$status"
          fi
