name: CI

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Install test dependencies
        run: python -m pip install pytest ruff
      - name: Seed queue
        run: python scripts/seed_queue.py
      - name: Lint
        run: python -m ruff check .
      - name: Tests
        run: python -m pytest
