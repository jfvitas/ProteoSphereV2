name: CI

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest ruff scikit-learn
          python -m pip install torch --index-url https://download.pytorch.org/whl/cpu
      - name: Seed queue
        run: python scripts/seed_queue.py
      - name: Lint
        run: python -m ruff check .
      - name: Repo smoke tests
        run: python -m pytest tests/unit/test_ci_presence.py tests/unit/test_bootstrap_repo.py tests/unit/test_model_studio_task_catalog.py -q
